<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.4"/>
