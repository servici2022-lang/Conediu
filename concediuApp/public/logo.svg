  <circle cx="32" cy="16" r="5" fill="#a78bfa"/>
  <!-- Body -->
  <line x1="32" y1="21" x2="32" y2="40" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms spread -->
  <line x1="32" y1="26" x2="18" y2="18" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="26" x2="46" y2="18" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms down -->
  <line x1="32" y1="26" x2="20" y2="34" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="26" x2="44" y2="34" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs spread -->
  <line x1="32" y1="40" x2="20" y2="56" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="44" y2="56" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs closer -->
  <line x1="32" y1="40" x2="26" y2="56" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="38" y2="56" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
</svg>
