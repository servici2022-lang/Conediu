<h4>{{ isEdit() ? 'Editare' : 'Adaugare' }} Sarbatoare</h4>
<nb-card class="form-card"><nb-card-body>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group"><label class="label">Denumire</label><input nbInput fullWidth formControlName="name" /></div>
    <div class="form-group"><label class="label">Data</label><input nbInput fullWidth formControlName="date" [nbDatepicker]="pk" /><nb-datepicker #pk></nb-datepicker></div>
    <div class="form-group"><nb-toggle formControlName="recurring">Recurenta (in fiecare an)</nb-toggle></div>
    <div class="form-actions"><button nbButton ghost routerLink="/holidays" type="button">Anuleaza</button><button nbButton status="primary" type="submit" [disabled]="form.invalid || loading()"><nb-icon icon="save-outline"></nb-icon> {{ isEdit() ? 'Salveaza' : 'Creeaza' }}</button></div>
  </form>
</nb-card-body></nb-card>
