<div class="holiday-form-page">
  <h1>{{ isEdit() ? 'Editare' : 'Adăugare' }} Sărbătoare</h1>
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Denumire</mat-label>
          <input matInput formControlName="name" />
          <mat-error>Denumirea este obligatorie</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Data</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="date" />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-slide-toggle formControlName="recurring">Recurentă (în fiecare an)</mat-slide-toggle>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/holidays">Anulează</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading()">
            <mat-icon>save</mat-icon> {{ isEdit() ? 'Salvează' : 'Creează' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
