<div class="page-header"><h4>Sarbatori Legale</h4><button nbButton status="primary" size="small" routerLink="/holidays/new"><nb-icon icon="plus-outline"></nb-icon> Adauga</button></div>
<nb-card><nb-card-body>
  <table class="data-table">
    <thead><tr><th>Denumire</th><th>Data</th><th>Recurenta</th><th>Actiuni</th></tr></thead>
    <tbody>@for (r of holidays(); track r._id) { <tr><td>{{ r.name }}</td><td>{{ r.date | date:'dd MMMM yyyy' }}</td><td>{{ r.recurring ? 'Da' : 'Nu' }}</td><td><button nbButton ghost size="tiny" [routerLink]="['/holidays', r._id, 'edit']"><nb-icon icon="edit-outline"></nb-icon></button><button nbButton ghost status="danger" size="tiny" (click)="delete(r._id)"><nb-icon icon="trash-2-outline"></nb-icon></button></td></tr> }</tbody>
  </table>
</nb-card-body></nb-card>
