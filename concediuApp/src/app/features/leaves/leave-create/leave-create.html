<h4>Cerere Noua de Concediu</h4>
<nb-card class="form-card">
  <nb-card-body>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="label">Tip Concediu</label>
        <nb-select fullWidth formControlName="leaveTypeId" placeholder="Selecteaza">
          @for (t of leaveTypes(); track t._id) { <nb-option [value]="t._id">{{ t.name }}</nb-option> }
        </nb-select>
      </div>
      <div class="row">
        <div class="form-group"><label class="label">Data inceput</label><input nbInput fullWidth formControlName="startDate" [nbDatepicker]="sp" /><nb-datepicker #sp></nb-datepicker></div>
        <div class="form-group"><label class="label">Data sfarsit</label><input nbInput fullWidth formControlName="endDate" [nbDatepicker]="ep" /><nb-datepicker #ep></nb-datepicker></div>
      </div>
      @if (workingDays() !== null) { <div class="wd-info"><nb-icon icon="checkmark-circle-outline" status="success"></nb-icon> <strong>{{ workingDays() }}</strong> zile lucratoare</div> }
      @if (calculating()) { <div class="wd-info"><nb-icon icon="clock-outline"></nb-icon> Se calculeaza...</div> }
      <div class="form-group"><label class="label">Motiv (optional)</label><textarea nbInput fullWidth formControlName="reason" rows="3"></textarea></div>
      <div class="form-actions">
        <button nbButton ghost routerLink="/leaves" type="button">Anuleaza</button>
        <button nbButton status="primary" type="submit" [disabled]="form.invalid || loading()" [nbSpinner]="loading()" nbSpinnerStatus="control"><nb-icon icon="paper-plane-outline"></nb-icon> Trimite</button>
      </div>
    </form>
  </nb-card-body>
</nb-card>
