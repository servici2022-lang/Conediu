<div class="user-list-page">
  <div class="page-header">
    <h1>Utilizatori</h1>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Căutare</mat-label>
        <input matInput [(ngModel)]="search" (keyup.enter)="onSearch()" placeholder="Nume, email..." />
        <mat-icon matSuffix (click)="onSearch()" style="cursor:pointer">search</mat-icon>
      </mat-form-field>
      <button mat-raised-button color="primary" routerLink="/users/new">
        <mat-icon>person_add</mat-icon> Utilizator Nou
      </button>
    </div>
  </div>

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="users()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nume</th>
        <td mat-cell *matCellDef="let row">{{ row.firstName }} {{ row.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let row">
          <span class="role-badge" [ngClass]="getRoleBadgeClass(row.role)">
            {{ row.role | uppercase }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span [class.active]="row.isActive" [class.inactive]="!row.isActive" class="status-dot">
            {{ row.isActive ? 'Activ' : 'Inactiv' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Creat la</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date: 'dd MMM yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acțiuni</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button matTooltip="Editează" [routerLink]="['/users', row._id, 'edit']">
            <mat-icon>edit</mat-icon>
          </button>
          @if (row.isActive) {
            <button mat-icon-button matTooltip="Dezactivează" color="warn" (click)="deactivateUser(row._id)">
              <mat-icon>block</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">Nu sunt utilizatori.</td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalItems()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</div>
