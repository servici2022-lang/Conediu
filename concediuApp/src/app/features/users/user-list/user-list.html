<div class="page-header">
  <h4>Utilizatori</h4>
  <div class="header-actions">
    <input nbInput placeholder="Cautare..." [(ngModel)]="search" (keyup.enter)="onSearch()" />
    <button nbButton status="primary" size="small" routerLink="/users/new"><nb-icon icon="person-add-outline"></nb-icon> Nou</button>
  </div>
</div>
<nb-card><nb-card-body>
  <table class="data-table">
    <thead><tr><th>Nume</th><th>Email</th><th>Rol</th><th>Status</th><th>Creat</th><th>Actiuni</th></tr></thead>
    <tbody>
      @for (r of users(); track r._id) {
        <tr>
          <td>{{ r.firstName }} {{ r.lastName }}</td><td>{{ r.email }}</td>
          <td><span class="role-badge" [ngClass]="'role-' + r.role">{{ r.role | uppercase }}</span></td>
          <td><span [class.active]="r.isActive" [class.inactive]="!r.isActive">{{ r.isActive ? 'Activ' : 'Inactiv' }}</span></td>
          <td>{{ r.createdAt | date:'dd MMM yyyy' }}</td>
          <td>
            <button nbButton ghost size="tiny" [routerLink]="['/users', r._id, 'edit']"><nb-icon icon="edit-outline"></nb-icon></button>
            @if (r.isActive) { <button nbButton ghost status="danger" size="tiny" (click)="deactivate(r._id)"><nb-icon icon="slash-outline"></nb-icon></button> }
          </td>
        </tr>
      } @empty { <tr><td colspan="6" class="no-data">Nu sunt utilizatori.</td></tr> }
    </tbody>
  </table>
</nb-card-body></nb-card>
