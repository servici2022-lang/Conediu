<h4>{{ isEdit() ? 'Editare' : 'Adaugare' }} Tip Concediu</h4>
<nb-card class="form-card"><nb-card-body>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group"><label class="label">Denumire</label><input nbInput fullWidth formControlName="name" /></div>
    <div class="form-group"><label class="label">Descriere</label><textarea nbInput fullWidth formControlName="description" rows="2"></textarea></div>
    <div class="form-group"><label class="label">Culoare</label><input nbInput formControlName="color" type="color" /></div>
    <div style="display:flex;flex-direction:column;gap:16px;margin:16px 0">
      <nb-toggle formControlName="isPaid">Platit</nb-toggle>
      <nb-toggle formControlName="deductsFromAllowance">Se scade din zile</nb-toggle>
      @if (isEdit()) { <nb-toggle formControlName="isActive">Activ</nb-toggle> }
    </div>
    <div class="form-actions"><button nbButton ghost routerLink="/leave-types" type="button">Anuleaza</button><button nbButton status="primary" type="submit" [disabled]="form.invalid || loading()"><nb-icon icon="save-outline"></nb-icon> {{ isEdit() ? 'Salveaza' : 'Creeaza' }}</button></div>
  </form>
</nb-card-body></nb-card>
