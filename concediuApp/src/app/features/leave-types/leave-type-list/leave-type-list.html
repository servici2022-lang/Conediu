<div class="page-header"><h4>Tipuri de Concediu</h4><button nbButton status="primary" size="small" routerLink="/leave-types/new"><nb-icon icon="plus-outline"></nb-icon> Tip Nou</button></div>
<nb-card><nb-card-body>
  <table class="data-table">
    <thead><tr><th></th><th>Denumire</th><th>Descriere</th><th>Platit</th><th>Se scade</th><th>Status</th><th>Actiuni</th></tr></thead>
    <tbody>@for (r of leaveTypes(); track r._id) {
      <tr>
        <td><span class="color-dot" [style.background-color]="r.color"></span></td><td>{{ r.name }}</td><td>{{ r.description }}</td><td>{{ r.isPaid ? 'Da' : 'Nu' }}</td><td>{{ r.deductsFromAllowance ? 'Da' : 'Nu' }}</td>
        <td><span [class.active]="r.isActive" [class.inactive]="!r.isActive">{{ r.isActive ? 'Activ' : 'Inactiv' }}</span></td>
        <td><button nbButton ghost size="tiny" [routerLink]="['/leave-types', r._id, 'edit']"><nb-icon icon="edit-outline"></nb-icon></button>@if (r.isActive) { <button nbButton ghost status="danger" size="tiny" (click)="deactivate(r._id)"><nb-icon icon="slash-outline"></nb-icon></button> }</td>
      </tr>
    }</tbody>
  </table>
</nb-card-body></nb-card>
