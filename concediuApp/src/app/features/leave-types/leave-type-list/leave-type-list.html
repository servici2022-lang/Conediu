<div class="leave-type-list-page">
  <div class="page-header">
    <h1>Tipuri de Concediu</h1>
    <button mat-raised-button color="primary" routerLink="/leave-types/new">
      <mat-icon>add</mat-icon> Tip Nou
    </button>
  </div>

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="leaveTypes()">
      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <span class="color-dot" [style.background-color]="row.color"></span>
        </td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Denumire</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descriere</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>
      <ng-container matColumnDef="isPaid">
        <th mat-header-cell *matHeaderCellDef>Plătit</th>
        <td mat-cell *matCellDef="let row">{{ row.isPaid ? 'Da' : 'Nu' }}</td>
      </ng-container>
      <ng-container matColumnDef="deducts">
        <th mat-header-cell *matHeaderCellDef>Se scade</th>
        <td mat-cell *matCellDef="let row">{{ row.deductsFromAllowance ? 'Da' : 'Nu' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span [class.active]="row.isActive" [class.inactive]="!row.isActive">
            {{ row.isActive ? 'Activ' : 'Inactiv' }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acțiuni</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button matTooltip="Editează" [routerLink]="['/leave-types', row._id, 'edit']">
            <mat-icon>edit</mat-icon>
          </button>
          @if (row.isActive) {
            <button mat-icon-button matTooltip="Dezactivează" color="warn" (click)="deactivate(row._id)">
              <mat-icon>block</mat-icon>
            </button>
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
