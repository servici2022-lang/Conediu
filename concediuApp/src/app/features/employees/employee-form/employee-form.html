<h4>{{ isEdit() ? 'Editare' : 'Adaugare' }} Angajat</h4>
<nb-card class="form-card"><nb-card-body>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (!isEdit()) { <div class="form-group"><label class="label">Utilizator</label><nb-select fullWidth formControlName="userId" placeholder="Selecteaza">@for (u of users(); track u._id) { <nb-option [value]="u._id">{{ u.firstName }} {{ u.lastName }} ({{ u.email }})</nb-option> }</nb-select></div> }
    <div class="row"><div class="form-group"><label class="label">Departament</label><input nbInput fullWidth formControlName="department" /></div><div class="form-group"><label class="label">Functie</label><input nbInput fullWidth formControlName="position" /></div></div>
    <div class="row"><div class="form-group"><label class="label">Data angajarii</label><input nbInput fullWidth formControlName="hireDate" [nbDatepicker]="hp" /><nb-datepicker #hp></nb-datepicker></div><div class="form-group"><label class="label">Manager</label><nb-select fullWidth formControlName="manager" placeholder="Fara manager"><nb-option value="">Fara manager</nb-option>@for (m of managers(); track m._id) { <nb-option [value]="m._id">{{ m.firstName }} {{ m.lastName }}</nb-option> }</nb-select></div></div>
    <div class="row"><div class="form-group"><label class="label">Zile CO/an</label><input nbInput fullWidth type="number" formControlName="totalLeaveDays" /></div><div class="form-group"><label class="label">Telefon</label><input nbInput fullWidth formControlName="phone" /></div></div>
    <div class="form-group"><label class="label">CNP</label><input nbInput fullWidth formControlName="cnp" /></div>
    <div class="form-actions"><button nbButton ghost routerLink="/employees" type="button">Anuleaza</button><button nbButton status="primary" type="submit" [disabled]="form.invalid || loading()"><nb-icon icon="save-outline"></nb-icon> {{ isEdit() ? 'Salveaza' : 'Creeaza' }}</button></div>
  </form>
</nb-card-body></nb-card>
