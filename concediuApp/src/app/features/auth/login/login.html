<nb-layout>
  <nb-layout-column>
    <div class="login-container">
      <nb-card class="login-card">
    <nb-card-header>
      <div class="login-header">
        <nb-icon icon="umbrella-outline" status="primary"></nb-icon>
        <h4>Concediu App</h4>
        <p>Autentificare</p>
      </div>
    </nb-card-header>
    <nb-card-body>
      @if (error()) {
        <nb-alert status="danger" closable (close)="error.set('')">{{ error() }}</nb-alert>
      }
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="label">Email</label>
          <input nbInput fullWidth formControlName="email" type="email" placeholder="email@exemplu.ro" />
        </div>
        <div class="form-group">
          <label class="label">Parola</label>
          <input nbInput fullWidth formControlName="password" [type]="hidePassword() ? 'password' : 'text'" placeholder="Introduceti parola" />
        </div>
        <button nbButton fullWidth status="primary" size="large" type="submit" [disabled]="form.invalid || loading()" [nbSpinner]="loading()" nbSpinnerStatus="control">Autentificare</button>
      </form>
    </nb-card-body>
      </nb-card>
    </div>
  </nb-layout-column>
</nb-layout>
